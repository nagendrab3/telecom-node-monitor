name: Telecom Node Monitor CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run tests
      run: pytest test_app.py -v

    - name: Build Docker image
      run: docker build -t telecom-node-monitor:latest .

    - name: Login to Docker Hub
      env:
        DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
        DOCKER_PASS: ${{ secrets.DOCKER_PASSWORD }}
      run: echo "$DOCKER_PASS" | docker login -u "$DOCKER_USER" --password-stdin

    - name: Push Docker image
      env:
        DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
      run: |
        docker tag telecom-node-monitor:latest $DOCKER_USER/telecom-node-monitor:latest
        docker push $DOCKER_USER/telecom-node-monitor:latest