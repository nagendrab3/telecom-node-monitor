name: Telecom Node Monitor CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run tests
      run: |
        pytest test_app.py -v

    - name: Build Docker image
      run: |
        docker build -t telecom-node-monitor:latest .

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker image
      run: |
        docker tag telecom-node-monitor:latest \
        ${{ secrets.DOCKER_USERNAME }}/telecom-node-monitor:latest
        docker push \
        ${{ secrets.DOCKER_USERNAME }}/telecom-node-monitor:latest